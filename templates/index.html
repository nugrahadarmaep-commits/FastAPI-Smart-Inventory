<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Manajemen Gudang</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <link href="/static/style.css" rel="stylesheet" />
  </head>

  <body class="bg-gray-900 text-gray-200 p-8 min-h-screen">
    <div class="max-w-4xl mx-auto">
      <h1 class="text-4xl font-extrabold text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-teal-400 mb-10 tracking-tight">
        📦 SISTEM MANAJEMEN GUDANG
      </h1>

      <div id="auth-section" class="bg-gray-800 border border-gray-700 p-8 rounded-3xl shadow-2xl mb-6 max-w-md mx-auto transition-all">
        <div class="flex bg-gray-900 rounded-xl p-1 mb-8">
          <button onclick="switchTab('login')" id="btn-tab-login" class="flex-1 py-2 rounded-lg font-bold text-sm bg-blue-600 text-white shadow-md transition-all">
            Masuk
          </button>
          <button onclick="switchTab('register')" id="btn-tab-register" class="flex-1 py-2 rounded-lg font-bold text-sm text-gray-400 hover:text-white transition-all">
            Daftar Akun
          </button>
        </div>

        <div id="form-login" class="animate-fade-in">
          <h2 class="text-2xl font-bold mb-6 text-white text-center">Selamat Datang</h2>
          <div class="space-y-4">
            <input id="login-username" type="text" placeholder="Nama Pengguna" class="bg-gray-900 border border-gray-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 p-4 rounded-xl text-white w-full outline-none transition-all" />
            <input id="login-password" type="password" placeholder="Kata Sandi" class="bg-gray-900 border border-gray-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 p-4 rounded-xl text-white w-full outline-none transition-all" />
            <button type="button" onclick="handleLogin()" class="bg-blue-600 hover:bg-blue-500 shadow-lg shadow-blue-500/30 px-4 py-4 rounded-xl font-bold w-full transition-all active:scale-95 text-white mt-4">
              Masuk ke Sistem
            </button>
          </div>
        </div>

        <div id="form-register" class="hidden animate-fade-in">
          <h2 class="text-2xl font-bold mb-6 text-white text-center">Pendaftaran Akun</h2>
          <div class="space-y-4">
            <input id="reg-username" type="text" placeholder="Nama Pengguna Baru" class="bg-gray-900 border border-gray-600 focus:border-teal-500 focus:ring-2 focus:ring-teal-500 p-4 rounded-xl text-white w-full outline-none transition-all" />
            <input id="reg-password" type="password" placeholder="Kata Sandi Baru" class="bg-gray-900 border border-gray-600 focus:border-teal-500 focus:ring-2 focus:ring-teal-500 p-4 rounded-xl text-white w-full outline-none transition-all" />
            <button type="button" onclick="handleRegister()" class="bg-teal-600 hover:bg-teal-500 shadow-lg shadow-teal-500/30 px-4 py-4 rounded-xl font-bold w-full transition-all active:scale-95 text-white mt-4">
              Daftar Sekarang
            </button>
          </div>
        </div>
      </div>

      <div id="app-section" class="hidden">
        
        <div class="flex justify-between items-center bg-gray-800 border border-gray-700 p-5 rounded-2xl shadow-lg mb-6">
          <div class="flex flex-col">
            <p class="text-sm text-gray-400">Pengguna Aktif</p>
            <p id="user-display" class="font-extrabold text-blue-400 uppercase tracking-wide"></p>
          </div>
          <div class="flex gap-3">
            <button onclick="deleteAccount()" class="border border-red-600 text-red-500 hover:bg-red-600 hover:text-white px-4 py-2 rounded-xl text-sm font-bold transition-all">
              Hapus Akun
            </button>
            <button onclick="logout()" class="bg-red-600 hover:bg-red-500 shadow-lg shadow-red-500/30 px-5 py-2 rounded-xl font-bold transition-all active:scale-95">
              Keluar
            </button>
          </div>
        </div>

        <div class="bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-lg mb-8">
          <h2 class="text-xl font-bold mb-5 text-white">Formulir Pemasukan Barang</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <input id="item-name" type="text" placeholder="Nama Barang" class="bg-gray-900 border border-gray-600 focus:border-blue-500 p-3 rounded-xl text-white outline-none" />
            <input id="item-qty" type="number" placeholder="Stok Barang (Unit)" class="bg-gray-900 border border-gray-600 focus:border-blue-500 p-3 rounded-xl text-white outline-none" />
            <input id="item-price" type="number" placeholder="Harga Satuan (Rp)" class="bg-gray-900 border border-gray-600 focus:border-blue-500 p-3 rounded-xl text-white outline-none" />
          </div>
          <button onclick="addItem()" class="bg-blue-600 hover:bg-blue-500 shadow-lg shadow-blue-500/30 px-4 py-3 rounded-xl font-bold mt-5 w-full transition-all active:scale-95">
            Simpan Data Barang
          </button>
        </div>

        <div class="bg-gray-800 border border-gray-700 p-6 rounded-2xl shadow-lg overflow-hidden">
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-gray-900 border border-gray-700 p-4 rounded-xl flex flex-col justify-center">
              <p class="text-sm text-gray-400">Total Kuantitas Barang</p>
              <p id="total-stok" class="text-2xl font-black text-blue-400">0 Unit</p>
            </div>
            <div class="bg-gray-900 border border-gray-700 p-4 rounded-xl flex flex-col justify-center">
              <p class="text-sm text-gray-400">Total Nilai Aset Gudang (Cash Balancing)</p>
              <p id="total-aset" class="text-2xl font-black text-green-400">Rp 0</p>
            </div>
          </div>

          <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-5">
            <h2 class="text-xl font-bold text-white">📋 Daftar Inventaris Gudang</h2>
            
            <div class="w-full md:w-64">
              <input id="search-input" type="text" oninput="filterItems()" placeholder="Cari nama barang..." class="bg-gray-900 border border-gray-600 focus:border-blue-500 p-2.5 rounded-xl text-white text-sm w-full outline-none transition-all" />
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="bg-gray-900 text-blue-300">
                  <th class="p-4 rounded-tl-xl">Nama Barang</th>
                  <th class="p-4">Stok tersedia</th>
                  <th class="p-4">Harga</th>
                  <th class="p-4 text-center rounded-tr-xl">Tindakan</th>
                </tr>
              </thead>
              <tbody id="item-table-body" class="divide-y divide-gray-700"></tbody>
            </table>
          </div>
        </div>

      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
